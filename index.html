<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Flip</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Auth Screen -->
  <div class="auth-overlay" id="auth-overlay">
    <div class="auth-box">
      <h1 class="auth-title">Coin Flip</h1>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-signup" onclick="showTab('signup')">Sign Up</button>
      </div>

      <form id="auth-form" onsubmit="handleAuth(event)">
        <div class="auth-field">
          <label>Username</label>
          <input type="text" id="auth-username" autocomplete="username" required />
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="auth-password" autocomplete="current-password" required />
        </div>
        <div class="auth-error" id="auth-error"></div>
        <button type="submit" class="auth-submit" id="auth-submit-btn">Sign In</button>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div class="container" id="app" style="display:none">
    <div class="app-header">
      <h1>Coin Flip</h1>
      <div class="user-info">
        <span id="welcome-msg"></span>
        <button class="signout-btn" onclick="signOut()">Sign Out</button>
      </div>
    </div>

    <!-- Balance -->
    <div class="balance-bar">
      <div class="balance-box">
        <span class="balance-label">Balance</span>
        <span class="balance-amount" id="balance">$100</span>
      </div>
      <div class="balance-box">
        <span class="balance-label">Bet</span>
        <div class="bet-controls">
          <button class="bet-btn" onclick="changeBet(-5)">−</button>
          <span class="bet-amount" id="bet-amount">$10</span>
          <button class="bet-btn" onclick="changeBet(5)">+</button>
        </div>
      </div>
    </div>

    <!-- Prediction -->
    <div class="prediction-section">
      <p class="prediction-label">Your prediction</p>
      <div class="prediction-btns">
        <button class="predict-btn" id="predict-heads" onclick="setPrediction('heads')">Heads</button>
        <button class="predict-btn" id="predict-tails" onclick="setPrediction('tails')">Tails</button>
      </div>
    </div>

    <div class="coin-area">
      <div class="coin" id="coin">
        <div class="coin-face heads">H</div>
        <div class="coin-face tails">T</div>
      </div>
      <div class="result-label" id="result-label"></div>
      <div class="payout-label" id="payout-label"></div>
    </div>

    <button id="flip-btn" onclick="flipCoin()" disabled>Pick a side first</button>

    <div class="stats">
      <div class="stat-box">
        <span class="stat-value" id="total-flips">0</span>
        <span class="stat-label">Total Flips</span>
      </div>
      <div class="stat-box">
        <span class="stat-value" id="heads-count">0</span>
        <span class="stat-label">Heads</span>
      </div>
      <div class="stat-box">
        <span class="stat-value" id="tails-count">0</span>
        <span class="stat-label">Tails</span>
      </div>
      <div class="stat-box">
        <span class="stat-value" id="ratio">—</span>
        <span class="stat-label">H : T Ratio</span>
      </div>
    </div>

    <div class="history-section">
      <h2>Last 5 Results</h2>
      <div class="history" id="history"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
